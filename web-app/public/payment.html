<!DOCTYPE html>
<html>

<head>

<title>Make Payment</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<div class="card p-4 shadow">

<h3 class="mb-4">Make Payment</h3>

<label class="form-label">Account Number</label>
<input id="account_id" type="number" class="form-control mb-3" placeholder="account_id">

<label class="form-label">Merchant Name</label>
<input id="merchant" class="form-control mb-3" placeholder="Merchant Name">

<label class="form-label">Amount</label>
<input id="amount" type="number" class="form-control mb-3" placeholder="Amount">

<button class="btn btn-success" onclick="pay()">Submit Payment</button>

<br><br>

<a href="dashboard.html" class="btn btn-secondary">Back to Dashboard</a>

</div>

</div>

<script>
async function pay(){
  
const account_id = document.getElementById("account_id").value
const amount = document.getElementById("amount").value
const merchant = document.getElementById("merchant").value

if(!amount || !merchant){
alert("Please enter all fields")
return
}

try{

const response = await fetch("/pay",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
account_id:account_id,
amount:amount,
merchant_name:merchant
})

})

const data = await response.json()
alert(data.message)

document.getElementById("amount").value=""
document.getElementById("merchant").value=""

}catch(err){
alert("Payment failed")
}

}
</script>

</body>

</html>
